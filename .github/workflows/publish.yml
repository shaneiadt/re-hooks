name: Publish Package

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release
        run: bun run release:check

      - name: Read package metadata
        id: pkg
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const pkg = require("./package.json");
          console.log(`name=${pkg.name}`);
          console.log(`version=${pkg.version}`);
          console.log(`tag=v${pkg.version}`);
          NODE

      - name: Check if version is already on npm
        id: npm_check
        continue-on-error: true
        run: |
          npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version

      - name: Stop if version already published
        if: steps.npm_check.outcome == 'success'
        run: |
          echo "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} is already published. Skipping."
          exit 0

      - name: Publish to npm
        if: steps.npm_check.outcome != 'success'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check if git tag already exists
        if: steps.npm_check.outcome != 'success'
        id: tag_check
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.pkg.outputs.tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push release tag
        if: steps.npm_check.outcome != 'success' && steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.pkg.outputs.tag }}" -m "Release ${{ steps.pkg.outputs.tag }}"
          git push origin "${{ steps.pkg.outputs.tag }}"
